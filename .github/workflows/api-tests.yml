name: API Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run API in background
        run: npm start &

      - name: Wait for API health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/healthcheck > /dev/null; then
              echo "API is running"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          echo "API did not start in time"
          exit 1

      - name: Run tests
        run: npm test
